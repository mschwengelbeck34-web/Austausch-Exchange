<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deutsch – Französisch Exchange</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <h1>Deutsch –<br>Französisch<br>Exchange</h1>
    <p class="subtitle">Bielefeld – Montpellier</p>
  </section>

  <!-- SECTION -->
  <section class="section">
    <h2>Exchange</h2>
    <p class="small">See again</p>
  </section>

  <!-- TEXT BOX -->
  <section class="card">
    <p>
      Every day, every hour, every minute and every second 
      until the German exchange partners arrive in Montpellier
    </p>
  </section>

  <!-- COUNTDOWN -->
  <section class="countdown">
    <div class="box">
      <span id="days">0</span>
      <p>Days</p>
    </div>

    <div class="box">
      <span id="hours">0</span>
      <p>Hours</p>
    </div>

    <div class="box">
      <span id="minutes">0</span>
      <p>Minutes</p>
    </div>

    <div class="box">
      <span id="seconds">0</span>
      <p>Seconds</p>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    all rights reserved © Mika Schwengelbeck / save at source
  </footer>

  <script src="script.js"></script>
</body>
</html>
